<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANAKIDS - Sistema Comercial Profissional</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--p:#1976d2;--pClaro:#e3f2fd;--d:#1565c0;--bg:#f8fafc;--texto:#2d3748;--sucesso:#2e7d32;--alerta:#f57c00;--erro:#d32f2f;--borda:#e2e8f0;--cinza:#94a3b8}
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0;padding:0}
body{background:var(--bg);color:var(--texto);font-size:15px}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#42a5f5,var(--d))}
.box-login{background:#fff;padding:35px;border-radius:16px;width:380px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.box-login h2{text-align:center;color:var(--p);margin-bottom:25px;font-size:22px}
input,select,textarea{width:100%;padding:11px 12px;margin:6px 0;border:1px solid var(--borda);border-radius:8px;font-size:15px;background:#fff}
input:focus,select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(25,118,210,0.1)}
button{cursor:pointer;border:0;border-radius:8px;padding:11px 16px;background:var(--p);color:#fff;font-weight:500;transition:all .2s;margin-top:8px;font-size:15px}
button:hover{background:var(--d);transform:translateY(-1px)}
button.sucesso{background:var(--sucesso)}
button.alerta{background:var(--alerta)}
button.erro{background:var(--erro)}
button.secundario{background:var(--cinza)}
.hidden{display:none !important}
.rotulo{font-size:13px;color:var(--cinza);margin-bottom:2px;display:block}
.sidebar{position:fixed;left:0;top:0;width:230px;height:100%;background:#fff;border-right:1px solid var(--borda);padding:20px 0;overflow-y:auto}
.sidebar-topo{padding:0 20px 20px;border-bottom:1px solid var(--borda);margin-bottom:10px}
.sidebar h3{color:var(--p);font-size:20px}
.sidebar button{background:transparent;color:var(--texto);text-align:left;width:100%;border-radius:0;margin:0;padding:10px 20px;border-left:3px solid transparent}
.sidebar button:hover,.sidebar button.ativo{background:var(--pClaro);color:var(--p);border-left-color:var(--p)}
.main{margin-left:230px;padding:25px;max-width:1400px}
.titulo-pagina{font-size:20px;margin-bottom:20px;color:var(--texto)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px;margin-bottom:20px}
.card{background:#fff;padding:18px;border-radius:10px;border:1px solid var(--borda);box-shadow:0 2px 5px rgba(0,0,0,0.03)}
.tabela-caixa{width:100%;border-collapse:collapse;margin-top:15px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--borda)}
.tabela-caixa th,.tabela-caixa td{padding:10px;text-align:left;border-bottom:1px solid var(--borda)}
.tabela-caixa th{background:var(--pClaro)}
.cupom-impressao{max-width:72mm;margin:0 auto;background:#fff;padding:5mm;display:none;font-family:'Courier New',monospace;line-height:1.3}
.container-pix-qrcode {background:#f0fdf4;border:1px dashed #bbf7d0;border-radius:10px;padding:15px;margin-top:15px;text-align:center}
.box-qrcode {display:flex;justify-content:center;margin:10px 0}
.pdv-item-linha {display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
.pdv-item-linha input {margin:0;padding:5px;text-align:center}
@media print{body *{visibility:hidden !important}.cupom-impressao,.cupom-impressao *{visibility:visible !important;display:block !important}.cupom-impressao{position:absolute;left:0;top:0;width:100% !important}}
.mensagem-flutuante{position:fixed;top:20px;right:20px;z-index:99999;background:#fff;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.15);border-left:4px solid;padding:15px 20px;min-width:300px}
</style>
</head>
<body>
<div id='telaLogin' class='login'>
  <div class='box-login'>
    <h2>🌸 ANAKIDS ERP</h2>
    <input id='usuario' placeholder='Usuário' value="anakids">
    <input id='senha' type='password' placeholder='Senha' value="1234">
    <button onclick='entrarSistema()'>Acessar Sistema</button>
  </div>
</div>
<div id='sistema' class='hidden'>
  <div class='sidebar'>
    <div class='sidebar-topo'><h3>🌸 ANAKIDS</h3></div>
    <button id='btn-nav-painel' onclick='abrirPagina("painel")' class='ativo'>🏠 Painel</button>
    <button id='btn-nav-pdv' onclick='abrirPagina("pdv")'>🛒 PDV / Vendas</button>
    <button id='btn-nav-config' onclick='abrirPagina("config")'>⚙️ Configurações</button>
  </div>
  <div class='main'>
    <div id='pag-pdv' class='pagina'>
      <h1 class='titulo-pagina'>🛒 Ponto de Venda</h1>
      <input id='campoLeitura' placeholder='Código...' onkeypress='if(event.key==="Enter") adicionarItemVenda();'>
      <div id='listaItensVenda'></div>
      <div class='card'>
        <h4>💰 Pagamento</h4>
        <input type='number' id='vendaPgDinheiro' value='0' oninput='recalcularRestante()'>
        <input type='number' id='vendaPgPix' value='0' oninput='recalcularRestante();gerarPixQrCode();'>
        <input type='number' id='vendaPgCartao' value='0' oninput='recalcularRestante()'>
        <div id="areaPixQrCode" class="container-pix-qrcode hidden">
          <div class="box-qrcode" id="qrcodeCanvas"></div>
        </div>
        <button onclick='finalizarVenda()'>✅ Finalizar Venda</button>
      </div>
    </div>
    <div id='pag-painel' class='pagina'>
      <h1 class='titulo-pagina'>🏠 Painel</h1>
      <div class='grid-2'>
        <div class='card'><h3>Produtos</h3><p id='qtdProdutos'>0</p></div>
        <div class='card'><h3>Clientes</h3><p id='qtdClientes'>0</p></div>
        <div class='card'><h3>Saldo Caixa</h3><p id='saldoCaixa'>R$ 0,00</p></div>
      </div>
    </div>

    <div id='pag-config' class='pagina hidden'>
      <h1 class='titulo-pagina'>⚙️ Configurações da Loja</h1>
      <div class='card'>
        <div><label class='rotulo'>Nome da Loja</label><input id='configNome'></div>
        <div><label class='rotulo'>CNPJ</label><input id='configCnpj'></div>
        <div><label class='rotulo'>Chave PIX</label><input id='configPixChave' placeholder='Chave Pix para QR Code'></div>
        <div><label class='rotulo'>Nome Pix</label><input id='configPixNome' placeholder='Nome na conta Pix'></div>
        <button onclick='saveConfigCompleto()' class='sucesso'>💾 Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('dbAnakids') || `{
  "produtos": [], "clientes": [], "vendas": [], "caixaAberto": null,
  "configLoja": {"nome":"ANAKIDS","cnpj":"00.000.000/0000-00","pixChave":"","pixNome":""}
}`);

let carrinho = [];
let numeroCupom = db.vendas.length + 1;

function salvarDB(){ localStorage.setItem('dbAnakids', JSON.stringify(db)); }

function entrarSistema(){
  document.getElementById('telaLogin').classList.add('hidden');
  document.getElementById('sistema').classList.remove('hidden');
}

function abrirPagina(nome){
  document.querySelectorAll('.pagina').forEach(p=>p.classList.add('hidden'));
  document.getElementById(`pag-${nome}`).classList.remove('hidden');
}

function adicionarItemVenda(){
  let field = document.getElementById('campoLeitura');
  let cod = field.value.trim();
  let prod = db.produtos.find(p=>p.codigo === cod);
  if(prod){
    carrinho.push({produto: prod, quantidade: 1});
    atualizarCarrinho();
  }
  field.value = '';
}

function atualizarCarrinho(){
  let html = carrinho.map((item, idx) => `
    <div class="pdv-item-linha">
      <div>${item.produto.nome}</div>
      <div>${item.produto.precoVenda.toFixed(2)}</div>
    </div>
  `).join('');
  document.getElementById('listaItensVenda').innerHTML = html;
}

function recalcularRestante(){
  // Lógica de cálculo de troco/restante omitida para brevidade
}

function criarPayloadPix(chave, nome, valor) {
    // Codificação básica para o padrão estático do Pix
    return "00020126230014br.gov.bcb.pix0111" + chave + "52040000530398654" + valor.length + valor.toFixed(2) + "5802BR59" + nome.length + nome + "6304";
}

function gerarPixQrCode(){
  let valor = parseFloat(document.getElementById('vendaPgPix').value || 0);
  if(valor > 0){
    document.getElementById('areaPixQrCode').classList.remove('hidden');
    document.getElementById('qrcodeCanvas').innerHTML = '';
    new QRCode(document.getElementById('qrcodeCanvas'), criarPayloadPix(db.configLoja.pixChave, db.configLoja.pixNome, valor));
  }
}
function finalizarVenda(){
  if(carrinho.length === 0){ alert('Carrinho vazio!'); return; }
  if(!db.caixaAberto){ alert('Abra o caixa primeiro!'); return; }

  let total = carrinho.reduce((s, i) => s + (i.produto.precoVenda * i.quantidade), 0);
  let din = parseFloat(document.getElementById('vendaPgDinheiro').value || 0);
  let pix = parseFloat(document.getElementById('vendaPgPix').value || 0);
  let cartao = parseFloat(document.getElementById('vendaPgCartao').value || 0);
  
  if(Math.abs(total - (din + pix + cartao)) > 0.01){
    alert('A soma dos pagamentos não confere com o total!'); return;
  }

  // Integração Pix: Registra entrada no movimento do caixa
  if(din > 0){
    db.caixaAberto.movimentos.push({hora:new Date().toISOString(), tipo:'entrada', valor:din, descricao:`Venda #${numeroCupom} (Dinheiro)`});
    db.caixaAberto.saldoAtual += din;
  }
  if(pix > 0){
    db.caixaAberto.movimentos.push({hora:new Date().toISOString(), tipo:'entrada', valor:pix, descricao:`Venda #${numeroCupom} (Pix)`});
    db.caixaAberto.saldoAtual += pix;
  }

  db.vendas.push({
    numero: numeroCupom++,
    data: new Date().toISOString(),
    total: total,
    pagamentos: {dinheiro: din, pix: pix, cartao: cartao}
  });

  salvarDB();
  alert('Venda finalizada com sucesso!');
  carrinho = [];
  atualizarCarrinho();
  document.getElementById('areaPixQrCode').classList.add('hidden');
}

function fecharCaixa(){
  if(confirm("Encerrar o turno do caixa?")){
    db.caixaAberto = null;
    salvarDB();
    location.reload();
  }
}

function saveConfigCompleto(){
  db.configLoja.nome = document.getElementById('configNome').value;
  db.configLoja.pixChave = document.getElementById('configPixChave').value;
  db.configLoja.pixNome = document.getElementById('configPixNome').value;
  salvarDB();
  alert('Configurações salvas!');
}
</script>
</body>
</html>
